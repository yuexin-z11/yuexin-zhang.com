<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: white; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typewriter-text {
            overflow: hidden;
            border-right: .15em solid white;
            white-space: nowrap;
            letter-spacing: .05em;
            animation: 
                typewriter 2.5s steps(30, end),
                blink .75s step-end infinite;
        }

        .enter-btn-fade {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }

        .bg-overlay {
            background: linear-gradient(to bottom, rgba(73, 33, 89, 0.4), rgba(25, 6, 34, 0.6));
        }
    </style>

<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const enterButton = document.querySelector('.enter-btn-fade');
            
            // Subtle parallax effect on background image
            window.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                const bg = document.querySelector('.bg-cover');
                bg.style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
            });

            // Button click interaction
            const btn = enterButton.querySelector('a');
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                // Create a fade-out effect for transition
                document.body.style.transition = 'opacity 0.8s ease-in-out';
                document.body.style.opacity = '0';
                setTimeout(() => {
                    // Logic for actual navigation would go here
                    console.log('Navigating to portfolio...');
                }, 800);
            });
        });
    </script>
